name: CI

on:
  push:
    branches: [main, "feature/**", "fix/**"]
    paths-ignore:
      - "**.md"
      - "dist/**"
      - "ops/**"
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

jobs:
  lint-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        rust: [stable]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxrandr-dev libxdo-dev libxkbcommon-dev \
            libwayland-dev libxext-dev libclang-18-dev \
            libavcodec-dev libavformat-dev libavutil-dev libswscale-dev \
            libpulse-dev libasound2-dev libdbus-1-dev xserver-xephyr xvfb \
            libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf libsystemd-dev libudev-dev \
            libopus-dev cmake pkg-config x11-utils

      - name: Install macOS system deps (homebrew)
        if: runner.os == 'macOS'
        run: |
          brew install ffmpeg

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        run: |
          choco install ffmpeg cmake -y
          # audiopus_sys needs a system opus; vcpkg/choco may lag — skip mic on win if missing

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (Linux)
        if: runner.os == 'Linux'
        run: >
          cargo clippy --workspace --all-targets --features systemd --
          -D clippy::correctness -D clippy::suspicious -D clippy::perf
          -D unused-imports -D unused-variables

      - name: Clippy (macOS / Windows — pure-Rust crates)
        if: runner.os != 'Linux'
        # Native stacks + daemon Windows service APIs are Linux-gated for CI.
        # qubox-daemon Windows code needs API surface fixes (tracked separately).
        run: >
          cargo clippy --all-targets
          -p qubox-proto -p qubox-signaling -p qubox-signaling-server
          -p qubox-transport -p qubox-sync -p qubox-identity
          -p qubox-clipboard -p qubox-pen -p qubox-platform
          -p qubox-rl-policy --
          -D clippy::correctness -D clippy::suspicious -D clippy::perf
          -D unused-imports -D unused-variables

      - name: Test (Linux — full workspace)
        if: runner.os == 'Linux'
        # No DISPLAY here: X11 unit tests skip cleanly. Dedicated e2e job owns Xephyr/Xvfb.
        env:
          DISPLAY: ""
        run: >
          cargo test --workspace --all-targets
          --exclude qubox-client-gui

      - name: Test (macOS / Windows — pure-Rust crates)
        if: runner.os != 'Linux'
        run: >
          cargo test --all-targets
          -p qubox-proto -p qubox-signaling -p qubox-signaling-server
          -p qubox-transport -p qubox-sync -p qubox-identity
          -p qubox-clipboard -p qubox-pen -p qubox-platform
          -p qubox-rl-policy

      - name: GUI vitest (Linux)
        if: runner.os == 'Linux'
        working-directory: apps/qubox-client-gui
        run: |
          npm ci || npm install
          npm test

