name: CI

on:
  push:
    branches: [main, "feature/**", "fix/**"]
    paths-ignore:
      - "**.md"
      - "dist/**"
      - "ops/**"
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

jobs:
  lint-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        rust: [stable]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxrandr-dev libxdo-dev libxkbcommon-dev \
            libwayland-dev libxext-dev libclang-18-dev \
            libavcodec-dev libavformat-dev libavutil-dev libswscale-dev \
            libpulse-dev libdbus-1-dev xserver-xephyr

      - name: Install macOS system deps (homebrew)
        if: runner.os == 'macOS'
        run: |
          brew install ffmpeg

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        run: |
          choco install ffmpeg

      - name: Start Xephyr :99 (Linux only)
        if: runner.os == 'Linux'
        run: |
          nohup Xephyr :99 -ac -screen 1024x768x24 -resizeable > /tmp/xephyr.log 2>&1 < /dev/null &
          disown
          sleep 2
          echo "Xephyr :99 started"

      - name: Test (skip client-gui)
        env:
          DISPLAY: ${{ runner.os == 'Linux' && ':99' || '' }}
        run: cargo test --workspace --all-targets --exclude client-gui

      - name: GUI vitest (Linux)
        if: runner.os == 'Linux'
        working-directory: apps/qubox-client-gui
        run: |
          npm ci || npm install
          npm test

  e2e-xephyr:
    name: Xephyr e2e (privacy + multi-display + stream registry)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Install system deps + Xephyr
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxrandr-dev libxdo-dev libxkbcommon-dev \
            libwayland-dev libxext-dev libclang-18-dev \
            libavcodec-dev libavformat-dev libavutil-dev libswscale-dev \
            libpulse-dev libdbus-1-dev xserver-xephyr

      - name: Start Xephyr :99
        run: |
          nohup Xephyr :99 -ac -screen 1024x768x24 -resizeable > /tmp/xephyr.log 2>&1 < /dev/null &
          disown
          sleep 2
          DISPLAY=:99 xdpyinfo >/dev/null
          echo "Xephyr ready"

      - name: Build e2e binaries
        run: |
          cargo build -p qubox-signaling-server -p qubox-host-agent -p qubox-client-cli

      - name: Run required e2e tests
        env:
          DISPLAY: ":99"
          QUBOX_REQUIRE_E2E: "1"
        run: |
          cargo test -p qubox-host-agent --test multi_display_e2e -- --nocapture
          cargo test -p qubox-host-agent --test privacy_e2e -- --nocapture
          cargo test -p qubox-client-cli --test stream_registry_e2e -- --nocapture

  cross-build-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Install MinGW cross-toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Build daemon (Windows MinGW cross-compile)
        run: cargo build --release --target x86_64-pc-windows-gnu -p qubox-daemon

      - name: Upload daemon binary (Windows)
        uses: actions/upload-artifact@v4
        with:
          name: quboxd-windows-x64
          path: target/x86_64-pc-windows-gnu/release/quboxd.exe
