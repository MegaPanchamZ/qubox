name: CI

on:
  push:
    branches: [main, "feature/**", "fix/**"]
    paths-ignore:
      - "**.md"
      - "dist/**"
      - "ops/**"
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

jobs:
  lint-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        rust: [stable]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxrandr-dev libxdo-dev libxkbcommon-dev \
            libwayland-dev libxext-dev libclang-18-dev \
            libavcodec-dev libavformat-dev libavutil-dev libswscale-dev \
            libpulse-dev libdbus-1-dev xserver-xephyr \
            libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf libsystemd-dev libudev-dev \
            x11-utils

      - name: Install macOS system deps (homebrew)
        if: runner.os == 'macOS'
        run: |
          brew install ffmpeg

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        run: |
          choco install ffmpeg cmake -y
          # audiopus_sys needs a system opus; vcpkg/choco may lag — skip mic on win if missing

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (Linux)
        if: runner.os == 'Linux'
        run: >
          cargo clippy --workspace --all-targets --features systemd --
          -D clippy::correctness -D clippy::suspicious -D clippy::perf
          -D unused-imports -D unused-variables

      - name: Clippy (macOS / Windows — pure-Rust crates)
        if: runner.os != 'Linux'
        # Native audio/input stacks (opus, webrtc-apm, udev/gilrs) need OS packages
        # that are painful on shared runners. Core correctness is gated on Linux.
        run: >
          cargo clippy --all-targets
          -p qubox-proto -p qubox-signaling -p qubox-signaling-server
          -p qubox-transport -p qubox-sync -p qubox-identity
          -p qubox-clipboard -p qubox-pen -p qubox-platform
          -p qubox-daemon -p qubox-rl-policy --
          -D clippy::correctness -D clippy::suspicious -D clippy::perf
          -D unused-imports -D unused-variables

      - name: Start Xephyr :99 (Linux only)
        if: runner.os == 'Linux'
        id: xephyr
        continue-on-error: true
        run: |
          nohup Xephyr :99 -ac -screen 1024x768x24 -resizeable > /tmp/xephyr.log 2>&1 < /dev/null &
          disown
          sleep 2
          DISPLAY=:99 xdpyinfo >/dev/null
          echo "Xephyr :99 started"

      - name: Test (skip client-gui)
        env:
          DISPLAY: ${{ runner.os == 'Linux' && steps.xephyr.outcome == 'success' && ':99' || '' }}
        run: cargo test --workspace --all-targets --exclude client-gui

      - name: GUI vitest (Linux)
        if: runner.os == 'Linux'
        working-directory: apps/qubox-client-gui
        run: |
          npm ci || npm install
          npm test

  e2e-xephyr:
    name: Xephyr e2e (privacy + multi-display + stream registry)
    runs-on: ubuntu-latest
    # Soft-fail: headless Xephyr is flaky on shared runners; do not block main.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Install system deps + Xephyr
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxrandr-dev libxdo-dev libxkbcommon-dev \
            libwayland-dev libxext-dev libclang-18-dev \
            libavcodec-dev libavformat-dev libavutil-dev libswscale-dev \
            libpulse-dev libdbus-1-dev xserver-xephyr

      - name: Start Xephyr :99
        run: |
          nohup Xephyr :99 -ac -screen 1024x768x24 -resizeable > /tmp/xephyr.log 2>&1 < /dev/null &
          disown
          sleep 2
          DISPLAY=:99 xdpyinfo >/dev/null
          echo "Xephyr ready"

      - name: Build e2e binaries
        run: |
          cargo build -p qubox-signaling-server -p qubox-host-agent -p qubox-client-cli

      - name: Run required e2e tests
        env:
          DISPLAY: ":99"
          QUBOX_REQUIRE_E2E: "1"
        run: |
          cargo test -p qubox-host-agent --test multi_display_e2e -- --nocapture
          cargo test -p qubox-host-agent --test privacy_e2e -- --nocapture
          cargo test -p qubox-client-cli --test stream_registry_e2e -- --nocapture

  cross-build-windows:
    runs-on: ubuntu-latest
    # Soft-fail: MinGW cross of the daemon needs extra sys deps; do not block main.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Install MinGW cross-toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Build daemon (Windows MinGW cross-compile)
        run: cargo build --release --target x86_64-pc-windows-gnu -p qubox-daemon

      - name: Upload daemon binary (Windows)
        uses: actions/upload-artifact@v4
        with:
          name: quboxd-windows-x64
          path: target/x86_64-pc-windows-gnu/release/quboxd.exe
