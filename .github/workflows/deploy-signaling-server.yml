name: Deploy signaling server

permissions:
  contents: read
  id-token: write

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/deploy-signaling-server.yml
      - Cargo.toml
      - Cargo.lock
      - apps/qubox-signaling-server/**
      - crates/qubox-proto/**
      - crates/qubox-signaling/**
      - ops/signaling-server/**
  workflow_dispatch:

concurrency:
  group: deploy-signaling-server
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
      CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
    steps:
      - uses: actions/checkout@v4

      - name: Install cross toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu

      - name: Install Rust target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Build release binary
        run: cargo build --locked --release --target aarch64-unknown-linux-gnu -p qubox-signaling-server

      - name: Package deploy bundle
        run: |
          mkdir -p dist
          cp target/aarch64-unknown-linux-gnu/release/qubox-signaling-server dist/qubox-signaling-server
          cp target/aarch64-unknown-linux-gnu/release/qubox-signaling-server dist/signaling-server
          aarch64-linux-gnu-strip dist/qubox-signaling-server dist/signaling-server
          cp ops/signaling-server/install-service.sh dist/install-service.sh
          cp ops/signaling-server/run-signaling-server.sh dist/run-signaling-server.sh
          cp ops/signaling-server/qubox-signaling.service dist/qubox-signaling.service
          chmod +x dist/install-service.sh dist/run-signaling-server.sh dist/signaling-server dist/qubox-signaling-server

      - name: Upload deploy bundle
        uses: actions/upload-artifact@v4
        with:
          name: signaling-server-arm64
          path: dist/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}
      EC2_SECURITY_GROUP_ID: ${{ vars.EC2_SECURITY_GROUP_ID }}
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}
      EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
      SIGNALING_ICE_SERVER: ${{ secrets.SIGNALING_ICE_SERVER }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}

      - name: Download deploy bundle
        uses: actions/download-artifact@v4
        with:
          name: signaling-server-arm64
          path: dist

      - name: Restore executable bits
        run: |
          chmod +x dist/install-service.sh dist/run-signaling-server.sh dist/signaling-server dist/qubox-signaling-server

      - name: Detect runner IP
        id: runner-ip
        run: |
          runner_ip="$(curl -fsSL https://checkip.amazonaws.com | tr -d '[:space:]')/32"
          echo "cidr=$runner_ip" >> "$GITHUB_OUTPUT"

      - name: Authorize runner SSH access
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id "$EC2_SECURITY_GROUP_ID" \
            --ip-permissions "IpProtocol=tcp,FromPort=22,ToPort=22,IpRanges=[{CidrIp=${{ steps.runner-ip.outputs.cidr }},Description='GitHub Actions temporary deploy access'}]" || true

      - name: Write SSH key
        run: |
          test -n "$EC2_HOST"
          test -n "$EC2_USER"
          test -n "$EC2_SSH_KEY"
          printf '%s\n' "$EC2_SSH_KEY" > "$RUNNER_TEMP/ec2_key"
          chmod 600 "$RUNNER_TEMP/ec2_key"

      - name: Upload bundle to instance
        run: |
          ssh -i "$RUNNER_TEMP/ec2_key" -o StrictHostKeyChecking=no "$EC2_USER@$EC2_HOST" 'rm -rf /tmp/qubox-deploy && mkdir -p /tmp/qubox-deploy'
          scp -i "$RUNNER_TEMP/ec2_key" -o StrictHostKeyChecking=no dist/* "$EC2_USER@$EC2_HOST:/tmp/qubox-deploy/"

      - name: Install and restart service
        run: |
          ice_arg=""
          if [[ -n "$SIGNALING_ICE_SERVER" ]]; then
            ice_arg=" --ice-server $SIGNALING_ICE_SERVER"
          fi

          ssh -i "$RUNNER_TEMP/ec2_key" -o StrictHostKeyChecking=no "$EC2_USER@$EC2_HOST" \
            "cd /tmp/qubox-deploy && sudo bash ./install-service.sh --binary /tmp/qubox-deploy/signaling-server --bind 0.0.0.0:7000 --pairing-store /var/lib/qubox/pairings.json${ice_arg}"

      - name: Verify health endpoint
        run: |
          curl --fail --retry 10 --retry-delay 3 "http://$EC2_HOST:7000/healthz"

      - name: Revoke runner SSH access
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id "$EC2_SECURITY_GROUP_ID" \
            --protocol tcp \
            --port 22 \
            --cidr "${{ steps.runner-ip.outputs.cidr }}" || true