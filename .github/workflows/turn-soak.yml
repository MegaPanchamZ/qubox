name: TURN soak (lab)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1" # weekly Monday 06:00 UTC

concurrency:
  group: turn-soak-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coturn-loopback:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start coturn (docker)
        run: |
          docker run -d --name coturn --network host \
            coturn/coturn:latest \
            -n --log-file=stdout \
            --listening-port=3478 \
            --fingerprint --lt-cred-mech \
            --user=qubox:quboxsoak \
            --realm=qubox.local \
            --no-cli --no-tls --no-dtls
          sleep 2
          docker logs coturn | tail -20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: TURN unit + transport tests
        env:
          QUBOX_TURN_URL: turn:127.0.0.1:3478
          QUBOX_TURN_USER: qubox
          QUBOX_TURN_PASS: quboxsoak
        run: |
          cargo test -p qubox-signaling-server --lib turn
          cargo test -p qubox-transport --lib turn
          echo "TURN soak loopback completed $(date -u +%Y-%m-%dT%H:%M:%SZ)" | tee turn-soak-log.txt

      - name: Upload soak log
        uses: actions/upload-artifact@v4
        with:
          name: turn-soak-log
          path: turn-soak-log.txt
