name: Mirror to private (qubox-cloud)

permissions:
  contents: read

# Cross-repo mirror: when something lands on the public AGPL repo main,
# push the same commit into the private `qubox-cloud` repo.
#
# Required secret: PRIVATE_REPO_TOKEN — fine-grained PAT with
# `contents: write` on MegaPanchamZ/qubox-cloud.
# Optional var: PRIVATE_REPO (default MegaPanchamZ/qubox-cloud).
#
# When the secret is missing the job exits green with a notice so forks
# and fresh clones do not see a red X.

on:
  push:
    branches:
      - main
    paths:
      - "crates/**"
      - "apps/qubox-signaling-server/**"
      - "apps/qubox-host-agent/**"
      - "apps/qubox-client-cli/**"
      - "apps/qubox-client-gui/**"
      - "apps/qubox-daemon/**"
      - "clients/**"
      - "ops/self-host/**"
      - "ops/signing/**"
      - "ops/local/**"
      - "Cargo.toml"
      - "Cargo.lock"
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref_filter:
        description: "Override git ref to mirror (e.g. a particular tag). Leave blank to use HEAD."
        required: false
        type: string
      target_branch:
        description: "Branch in the private repo to update"
        required: false
        type: string
        default: main

concurrency:
  group: mirror-to-private
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    env:
      TARGET_REPO: ${{ vars.PRIVATE_REPO || 'MegaPanchamZ/qubox-cloud' }}
      TARGET_BRANCH: ${{ inputs.target_branch || 'main' }}
      TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
    steps:
      - name: Check secret configured
        id: gate
        run: |
          if [[ -z "${TOKEN:-}" ]]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::PRIVATE_REPO_TOKEN not set — skipping mirror."
            echo "::notice::Add a fine-grained PAT with contents:write on $TARGET_REPO to enable."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve ref + commit
        if: steps.gate.outputs.configured == 'true'
        id: resolve
        env:
          EVENT: ${{ github.event_name }}
          REF: ${{ github.ref }}
          REF_OVERRIDE: ${{ inputs.ref_filter }}
        run: |
          if [[ -n "$REF_OVERRIDE" ]]; then
            echo "ref=$REF_OVERRIDE" >> "$GITHUB_OUTPUT"
          elif [[ "$EVENT" == "push" ]]; then
            case "$REF" in
              refs/tags/*) echo "ref=${REF#refs/tags/}" >> "$GITHUB_OUTPUT" ;;
              refs/heads/*) echo "ref=${REF#refs/heads/}" >> "$GITHUB_OUTPUT" ;;
              *) echo "Unsupported ref $REF" >&2; exit 2 ;;
            esac
            echo "commit=$GITHUB_SHA" >> "$GITHUB_OUTPUT"
          else
            echo "ref=main" >> "$GITHUB_OUTPUT"
            echo "commit=$GITHUB_SHA" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout (shallow, public)
        if: steps.gate.outputs.configured == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve.outputs.ref }}
          fetch-depth: 1

      - name: Mirror branch push
        if: steps.gate.outputs.configured == 'true' && steps.resolve.outputs.ref == 'main'
        run: |
          set -euo pipefail
          echo "[mirror] syncing $GITHUB_SHA → $TARGET_REPO@$TARGET_BRANCH"
          git push "https://x-access-token:${TOKEN}@github.com/${TARGET_REPO}.git" \
                  "$GITHUB_SHA:refs/heads/$TARGET_BRANCH"
          echo "[mirror] branch updated"

      - name: Mirror tag push
        if: steps.gate.outputs.configured == 'true' && startsWith(steps.resolve.outputs.ref, 'v')
        run: |
          set -euo pipefail
          local_ref="$GITHUB_SHA"
          local_tag="${{ steps.resolve.outputs.ref }}"
          echo "[mirror] syncing tag $local_tag ($local_ref) → $TARGET_REPO"
          git push "https://x-access-token:${TOKEN}@github.com/${TARGET_REPO}.git" \
                  "$local_ref:refs/tags/$local_tag"
          echo "[mirror] tag pushed"

      - name: Verify push
        if: steps.gate.outputs.configured == 'true'
        run: |
          set -euo pipefail
          echo "[mirror] verifying…"
          resp=$(curl -fsSL \
            -H "Authorization: Bearer ${TOKEN}" \
            "https://api.github.com/repos/${TARGET_REPO}/commits/${TARGET_BRANCH}")
          head_sha=$(echo "$resp" | jq -r '.sha // empty')
          if [[ -z "$head_sha" ]]; then
            echo "[mirror] WARN: could not read head; not fatal."
            exit 0
          fi
          echo "[mirror] target HEAD = $head_sha"
          if [[ "$head_sha" == "$GITHUB_SHA" ]]; then
            echo "[mirror] OK: private $TARGET_BRANCH == public $GITHUB_SHA"
          else
            echo "[mirror] NOTE: private $TARGET_BRANCH is now $head_sha (expected $GITHUB_SHA)"
            echo "[mirror] this is normal when the private repo has prior commits."
          fi
