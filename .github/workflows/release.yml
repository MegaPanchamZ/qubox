name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0). Must already exist or will be created from main tip after build."
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

permissions:
  contents: write

jobs:
  resolve-ref:
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.set-ref.outputs.ref }}
      tag: ${{ steps.set-ref.outputs.tag }}
    steps:
      - id: set-ref
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "ref=${{ github.ref }}" >> "$GITHUB_OUTPUT"
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            TAG="${{ github.event.inputs.tag }}"
            if [[ -z "$TAG" ]]; then
              echo "::error::Push a v* tag or pass workflow_dispatch input tag=vX.Y.Z"
              exit 1
            fi
            echo "ref=refs/tags/$TAG" >> "$GITHUB_OUTPUT"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build (${{ matrix.os }})
    needs: resolve-ref
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # host triple is detected at runtime (macos-latest is arm64)
          - os: ubuntu-latest
            artifact: release-linux
          - os: macos-latest
            artifact: release-macos
          - os: windows-latest
            artifact: release-windows
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-ref.outputs.ref }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxrandr-dev libxdo-dev libxkbcommon-dev \
            libwayland-dev libxext-dev libclang-18-dev \
            libavcodec-dev libavformat-dev libavutil-dev libswscale-dev libavfilter-dev libavdevice-dev \
            libpulse-dev libdbus-1-dev libasound2-dev \
            autoconf automake libtool \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libssl-dev \
            libudev-dev libopus-dev \
            libpipewire-0.3-dev libspa-0.2-dev libsystemd-dev \
            pkg-config \
            rpm

      - name: Install macOS system dependencies
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install opus pkg-config autoconf automake libtool

      - name: Install Windows system dependencies (vcpkg + opus)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          vcpkg --version 2>&1 | Out-Null
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Installing vcpkg..."
            git clone https://github.com/microsoft/vcpkg C:\vcpkg
            C:\vcpkg\bootstrap-vcpkg.bat -disableMetrics
          }
          $env:VCPKG_ROOT = "C:\vcpkg"
          $env:PATH = "C:\vcpkg;$env:PATH"
          vcpkg integrate install
          vcpkg install opus:x64-windows-static-md
          # audiopus_sys appends /lib to LIBOPUS_LIB_DIR — pass the *prefix*, not .../lib
          $opusPrefix = "C:\vcpkg\installed\x64-windows-static-md"
          if (-not (Test-Path "$opusPrefix\lib\opus.lib")) {
            $opusPrefix = "C:\vcpkg\packages\opus_x64-windows-static-md"
          }
          Write-Host "opus prefix: $opusPrefix"
          Get-ChildItem "$opusPrefix\lib" | Select-Object Name
          echo "VCPKG_ROOT=C:\vcpkg" >> $env:GITHUB_ENV
          echo "LIBOPUS_LIB_DIR=$opusPrefix" >> $env:GITHUB_ENV
          echo "OPUS_LIB_DIR=$opusPrefix" >> $env:GITHUB_ENV
          echo "LIBOPUS_STATIC=1" >> $env:GITHUB_ENV

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # ── Sidecar binaries (bundled into Tauri via externalBin) ─────────

      - name: "Build sidecars (Linux)"
        if: runner.os == 'Linux'
        run: cargo build --release -p qubox-daemon -p qubox-host-agent -p qubox-client-cli -p qubox-signaling-server

      - name: "Build sidecars (macOS)"
        if: runner.os == 'macOS'
        run: |
          # daemon: no systemd feature
          cargo build --release --no-default-features -p qubox-daemon
          # host/client keep default features (mic-apm when available)
          cargo build --release -p qubox-host-agent -p qubox-client-cli -p qubox-signaling-server

      - name: "Build sidecars (Windows — no webrtc APM)"
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "LIBOPUS_LIB_DIR=$env:LIBOPUS_LIB_DIR"
          # daemon: no systemd; host/client: no mic-apm (default features off)
          cargo build --release --no-default-features -p qubox-daemon -p qubox-host-agent -p qubox-client-cli -p qubox-signaling-server

      - name: Stage Tauri externalBin sidecars
        shell: bash
        run: |
          set -euo pipefail
          # Match the host triple Tauri expects (not a hardcoded matrix value —
          # macos-latest is aarch64, not x86_64).
          TARGET="$(rustc -vV | sed -n 's/^host: //p')"
          echo "host triple: $TARGET"
          DEST="apps/qubox-client-gui/src-tauri/binaries"
          mkdir -p "$DEST"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            EXT=".exe"
          else
            EXT=""
          fi
          for bin in qubox-daemon qubox-host-agent qubox-client-cli; do
            src="target/release/${bin}${EXT}"
            # Tauri externalBin naming: name-TARGETTRIPLE[.exe]
            dst="${DEST}/${bin}-${TARGET}${EXT}"
            if [[ ! -f "$src" ]]; then
              echo "::error::missing sidecar $src"
              exit 1
            fi
            cp "$src" "$dst"
            chmod +x "$dst" || true
            echo "staged $dst"
          done
          ls -la "$DEST"

      # ── Desktop app (primary product) ────────────────────────────────

      - name: Build client-gui (Tauri)
        working-directory: apps/qubox-client-gui
        shell: bash
        env:
          # audiopus_sys may be pulled into the Tauri graph on Windows
          LIBOPUS_LIB_DIR: ${{ env.LIBOPUS_LIB_DIR }}
          OPUS_LIB_DIR: ${{ env.OPUS_LIB_DIR }}
          LIBOPUS_STATIC: "1"
        run: |
          set -euo pipefail
          npm ci
          npx tauri build

      # ── Collect artifacts ────────────────────────────────────────────

      - name: Collect artifacts (Unix)
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          mkdir -p dist
          # Primary: Tauri installers. Tauri outputs to the workspace target dir
          # when the GUI crate is part of a Cargo workspace.
          for bundle_dir in apps/qubox-client-gui/src-tauri/target/release/bundle apps/qubox-client-gui/target/release/bundle target/release/bundle; do
            if [ -d "$bundle_dir" ]; then
              cp -r "$bundle_dir"/* dist/ 2>/dev/null || true
              echo "collected from $bundle_dir"
              break
            fi
          done
          # Optional: raw sidecars + self-host signaling for power users
          mkdir -p dist/bin
          for bin in qubox-daemon qubox-host-agent qubox-client-cli qubox-signaling-server; do
            [ -f "target/release/$bin" ] && cp "target/release/$bin" "dist/bin/$bin" && echo "copied $bin"
          done
          find dist -type f \( -name '*.deb' -o -name '*.rpm' -o -name '*.AppImage' -o -name '*.dmg' -o -name '*.app' \) -print || true
          (cd dist && find . -type f ! -name SHA256SUMS -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS)
          ls -laR dist | head -80

      - name: Collect artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $candidates = @(
            "apps/qubox-client-gui/src-tauri/target/release/bundle",
            "apps/qubox-client-gui/target/release/bundle",
            "target/release/bundle"
          )
          foreach ($bundle in $candidates) {
            if (Test-Path $bundle) {
              Copy-Item -Recurse -Force "$bundle\*" dist\
              Write-Host "collected from $bundle"
              break
            }
          }
          New-Item -ItemType Directory -Force -Path dist\bin | Out-Null
          $bins = @('qubox-daemon.exe','qubox-host-agent.exe','qubox-client-cli.exe','qubox-signaling-server.exe')
          foreach ($b in $bins) {
            $src = "target/release/$b"
            if (Test-Path $src) {
              Copy-Item $src "dist\bin\$b"
              Write-Host "copied $b"
            }
          }
          Get-ChildItem -Recurse dist -File | ForEach-Object {
            $rel = $_.FullName.Substring((Resolve-Path dist).Path.Length + 1)
            $h = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
            "$h  $rel"
          } | Set-Content -Encoding ascii dist/SHA256SUMS
          Get-Content dist/SHA256SUMS
          Get-ChildItem -Recurse dist | Select-Object FullName

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/
          retention-days: 5
          if-no-files-found: error

  sbom:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-ref.outputs.ref }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx

      - name: Generate CycloneDX SBOM
        run: cargo cyclonedx --override-filename-suffix .cdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: "*.cdx.json"
          retention-days: 5

  release:
    needs: [build, sbom]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-ref.outputs.tag }}
          name: "Qubox ${{ needs.resolve-ref.outputs.tag }}"
          body_path: .github/release-template.md
          files: |
            artifacts/release-linux/**
            artifacts/release-macos/**
            artifacts/release-windows/**
            artifacts/sbom/*
          generate_release_notes: true
          fail_on_unmatched_files: false
