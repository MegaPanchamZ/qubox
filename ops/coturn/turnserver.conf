# turnserver.conf — coturn configuration for Qubox staging.
#
# This is the dev/staging configuration. In production, replace:
#   - static-auth-secret with a strong random secret
#   - realm with your domain
#   - Consider adding cert.pem / pkey.pem for TLS (5349)

listening-port=3478
tls-listening-port=5349
realm=bp
static-auth-secret=dev_shared_secret_change_me

# Rate limiting
user-quota=12
total-quota=1200

# Disable insecure TLS versions
no-tlsv1
no-tlsv1_1

# Disable CLI (security)
no-cli

# Logging
log-file=stdout
verbose-logging=on

# STUN-only mode (no TURN relaying) is allowed
stun-only=0

# Relay address (auto-detect; set explicitly if behind NAT)
# relay-ip=0.0.0.0

# External IP (set if behind NAT)
# external-ip=1.2.3.4

# Process daemonisation (run in foreground for Docker)
no-daemon

# Fingerprint attribute (RFC 5389)
fingerprint

# Mobility (RFC 6062 TCP support)
mobility
